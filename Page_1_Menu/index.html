<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu — Spice Junction</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar">
    <a class="nav-brand" href="index.html">🌶 Spice Junction</a>
    <div class="nav-links">
      <a href="index.html" class="active">Menu</a>
      <a href="../Page_2_About/index.html">About</a>
      <a href="../Page_3_Careers/careers.html">Careers</a>
    </div>
  </nav>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <h1>Spice Junction</h1>
    <p class="tagline">Authentic flavours, lovingly crafted since 2005</p>
  </header>

  <!-- ── CATEGORY FILTERS ── -->
  <section class="filter-section">
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-category="All">All</button>
      <button class="filter-btn" data-category="Starters">Starters</button>
      <button class="filter-btn" data-category="Main Course">Main Course</button>
      <button class="filter-btn" data-category="Biryani">Biryani</button>
      <button class="filter-btn" data-category="Desserts">Desserts</button>
      <button class="filter-btn" data-category="Beverages">Beverages</button>
    </div>
  </section>

  <!-- ── MENU GRID ── -->
  <main class="menu-section">
    <div class="menu-grid" id="menuGrid">
      <!-- Cards injected by script.js -->
    </div>
  </main>

  <!-- ── CART BAR ── -->
  <div class="cart-bar" id="cartBar">
    <div class="cart-bar-inner" id="cartBarInner">
      <span class="cart-icon">🛒</span>
      <span id="cartCount">0 items</span>
      <span class="cart-sep">|</span>
      <span id="cartTotal">₹0</span>
      <span class="cart-toggle-hint">▲ View cart</span>
    </div>

    <!-- Expanded breakdown -->
    <div class="cart-breakdown" id="cartBreakdown">
      <div class="breakdown-header">Order Summary</div>
      <div id="breakdownList"></div>
      <div class="breakdown-total" id="breakdownTotal"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
